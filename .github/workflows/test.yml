name: CI

on:
  push:
    branches: [ main ]
    tags:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.16.0

    - name: Build
      run: zig build
      timeout-minutes: 5

    - name: Run tests
      run: zig build test --summary all
      timeout-minutes: 5

    - name: Test demo server
      run: python3 test_demo_server.py
      timeout-minutes: 5

    - name: Build zio example
      run: zig build
      working-directory: examples/zio
      timeout-minutes: 5

    - name: Build examples
      run: zig build examples
      timeout-minutes: 5

    - name: Run client example
      run: ./zig-out/bin/client-example https://httpbin.org/get
      timeout-minutes: 1
      if: runner.os != 'Windows'

    - name: Run client example (Windows)
      run: .\zig-out\bin\client-example.exe https://httpbin.org/get
      timeout-minutes: 1
      if: runner.os == 'Windows'
